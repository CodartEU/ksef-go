version: "2"

linters:
  disable-all: true
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - depguard
    - dogsled
    - dupword
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    # execinquery: removed in v2 (was deprecated, use sqlclosecheck + rowserrcheck instead)
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gocognit
    - goconst
    - gocritic
    - gofmt
    - gofumpt
    - mnd           # renamed from gomnd
    - goprintffuncname
    - gosec
    - gosimple
    - govet
    - importas
    - inamedparam
    - ineffassign
    - lll
    - loggercheck
    - makezero
    - mirror
    - misspell
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - protogetter
    - reassign
    - revive
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - staticcheck
    - stylecheck
    - tagalign
    - usetesting     # replaces tenv (removed in v2)
    - testableexamples
    - testifylint
    - thelper
    - tparallel
    - typecheck
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - whitespace
    - wrapcheck
    - zerologlint

  settings:
    depguard:
      rules:
        main:
          allow:
            - "$gostd"
            - "github.com"
    dupl:
      threshold: 100
    funlen:
      lines: 100
      statements: 50
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      enabled-checks:
        - deferInLoop
        - deferUnlambda
        - dupImport
        - emptyFallthrough
        - emptyStringTest
        - octalLiteral
    gocyclo:
      min-complexity: 15
    gofmt:
      rewrite-rules:
        - pattern: "interface{}"
          replacement: "any"
        - pattern: "a[b:len(a)]"
          replacement: "a[b:]"
    govet:
      enable-all: true
      disable:
        - fieldalignment
    lll:
      line-length: 120
      tab-width: 4
    misspell:
      locale: US
    nolintlint:
      allow-unused: false
      require-explanation: false
      require-specific: true
    tagalign:
      align: true
      sort: true
      order:
        - json
      strict: true
    testifylint:
      enable-all: true
    usestdlibvars:
      time-month: true
      time-layout: true
      crypto-hash: true
      default-rpc-path: true
      sql-isolation-level: true
      tls-signature-scheme: true
      constant-kind: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - wrapcheck
        - errcheck
    - path: ^examples\
      linters:
        - errcheck

run:
  timeout: 5m
  # allow-parallel-runners removed in v2 — parallel execution is now the default
